<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Remisión</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

.remision{
width:210mm;
min-height:297mm;
background:white;
margin:auto;
padding:20px;
}

.encabezado{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:orange;
}

.empresa{
text-align:center;
font-size:14px;
}

.remision-num{
text-align:right;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:13px;
}

th{
background:#eee;
}

input{
border:none;
width:100%;
font-size:13px;
}

.cliente td{
border:1px solid #ccc;
}

.productos{
margin-top:20px;
}

.total-box{
width:250px;
margin-left:auto;
margin-top:20px;
}

.firmas{
margin-top:60px;
display:flex;
justify-content:space-between;
}

.firma{
text-align:center;
width:250px;
}

.linea{
border-top:1px solid black;
margin-top:40px;
}

button{
margin:20px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

@media print{

button{
display:none;
}

body{
background:white;
}

}

</style>

<script>

function calcularTotal(fila){

let precio = parseFloat(document.getElementById("precio"+fila).value) || 0;
let cantidad = parseFloat(document.getElementById("cantidad"+fila).value) || 0;
let descuento = parseFloat(document.getElementById("descuento"+fila).value) || 0;

let total = precio * cantidad;
total = total - (total * descuento / 100);

document.getElementById("total"+fila).innerText = total.toLocaleString();

calcularGranTotal();

}

function calcularGranTotal(){

let suma = 0;

for(let i=1;i<=10;i++){

let t = document.getElementById("total"+i).innerText.replace(/,/g,'');
suma += parseFloat(t) || 0;

}

document.getElementById("granTotal").innerText = suma.toLocaleString();

}

</script>

</head>

<body>

<button onclick="window.print()">Descargar / Imprimir PDF</button>

<div class="remision">

<div class="encabezado">

<div class="logo">
FLASH
</div>

<div class="empresa">
<b>PLUS MOVIL S.A.S</b><br>
NIT 900959467-7<br>
CR 31 36 14 LC 212 CENTRO COMERCIAL EL PARQUE<br>
Villavicencio<br>
+57 3212366699
</div>

<div class="remision-num">
<b>Remisión</b><br>
N° <input type="text" style="width:80px">
</div>

</div>

<table class="cliente">

<tr>
<td>Señor(es)</td>
<td><input></td>
<td>Fecha</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Dirección</td>
<td><input></td>
<td>Fecha vencimiento</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Ciudad</td>
<td><input></td>
<td>Teléfono</td>
<td><input></td>
</tr>

<tr>
<td>Cédula</td>
<td><input></td>
<td></td>
<td></td>
</tr>

</table>

<table class="productos">

<tr>
<th>Item</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Descuento %</th>
<th>Total</th>
</tr>

<script>

for(let i=1;i<=10;i++){

document.write(`
<tr>

<td><input></td>

<td><input type="number" id="precio${i}" oninput="calcularTotal(${i})"></td>

<td><input type="number" id="cantidad${i}" oninput="calcularTotal(${i})"></td>

<td><input type="number" id="descuento${i}" oninput="calcularTotal(${i})"></td>

<td id="total${i}">0</td>

</tr>
`)

}

</script>

</table>

<div class="total-box">

<table>

<tr>
<td><b>Total</b></td>
<td>$ <span id="granTotal">0</span></td>
</tr>

</table>

</div>

<div class="firmas">

<div class="firma">
<div class="linea"></div>
ELABORADO POR
</div>

<div class="firma">
<div class="linea"></div>
ACEPTADA FIRMA Y SELLO
</div>

</div>

</div>

</body>
</html>
